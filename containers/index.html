<!DOCTYPE html>
<html>
<head>
    <title>HTML Containers</title>
</head>

<body>

<h1>HTML Containers</h1>

<!-- DIV Example -->
<div>
    This is first div
</div>

<div>
    This is second div
</div>

<br>

<!-- SPAN Example -->
<span>This is first span</span>
<span>This is second span</span>

<br><br>

<!-- Mixed Example -->
<p>
    My name is <span style="color:red;">Vigneshwar</span>
</p>

<div style="border:1px solid black; padding:10px;">
    This content is inside a div box
</div>

</body>
</html>
