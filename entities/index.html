<!DOCTYPE html>
<html>
<head>
    <title>HTML Entities</title>
</head>

<body>

<h1>Common HTML Entities</h1>

<!-- Space -->
<p>Hello&nbsp;&nbsp;World</p>

<!-- Less than and Greater than -->
<p>&lt;h1&gt;Heading&lt;/h1&gt;</p>

<!-- Ampersand -->
<p>Tom &amp; Jerry</p>

<!-- Copyright -->
<p>&copy; 2026 My Website</p>

<!-- Registered -->
<p>Brand Name &reg;</p>

<!-- Heart -->
<p>I Love HTML &hearts;</p>

</body>
</html>
