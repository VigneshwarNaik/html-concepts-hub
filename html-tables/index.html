<!DOCTYPE html>
<!-- Tells browser this is HTML5 -->

<html>
<!-- Root element of webpage -->

<head>
    <!-- Head section contains page info -->

    <title>HTML Tables</title>
    <!-- Browser tab title -->

</head>

<body>
    <!-- Visible content starts here -->

    <h1>Student Details Table</h1>
    <!-- Main heading -->

    <table border="1">
        <!-- Creates table with border -->

        <thead>
            <!-- Table heading section -->

            <tr>
                <!-- First row -->

                <th rowspan="2">ID</th>
                <!-- Merge ID heading into 2 rows -->

                <th>Name</th>
                <!-- Column heading -->

                <th>Course</th>
                <!-- Column heading -->

            </tr>

            <tr>
                <!-- Second header row -->

                <th colspan="2">Student Info</th>
                <!-- Merge 2 columns -->

            </tr>

        </thead>

        <tbody>
            <!-- Table body starts -->

            <tr>
                <!-- Row 1 -->

                <td>101</td>
                <td>Vigneshwar</td>
                <td>MCA</td>

            </tr>

            <tr>
                <!-- Row 2 -->

                <td>102</td>
                <td>Rahul</td>
                <td>BCA</td>

            </tr>

        </tbody>

        <tfoot>
            <!-- Footer section -->

            <tr>
                <td colspan="3">Total Students: 2</td>
                <!-- Merge 3 columns -->
            </tr>

        </tfoot>

    </table>

</body>
<!-- Body ends -->

</html>
<!-- HTML ends -->
